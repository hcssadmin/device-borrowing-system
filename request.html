<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>Admin - Pending Approval</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- ✅ 還原原本完整導航 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">
<a class="navbar-brand" href="index.html">裝置借用系統</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="mainNav">
<ul class="navbar-nav me-auto mb-2 mb-lg-0">
<li class="nav-item"><a class="nav-link" href="index.html">狀態主頁</a></li>
<li class="nav-item"><a class="nav-link" href="device-management.html">裝置管理</a></li>
<li class="nav-item"><a class="nav-link active" href="incompleted-request-admin.html">待處理請求</a></li>
<li class="nav-item"><a class="nav-link" href="borrowed-device-admin.html">已借出裝置</a></li>
</ul>
<span class="navbar-text text-white">登入使用者：Admin</span>
</div>
</div>
</nav>

<div class="container mt-4">
<h4 class="mb-3">待審批借用請求</h4>

<table class="table table-bordered table-hover bg-white align-middle">
<thead class="table-light">
<tr>
<th>使用者</th>
<th>裝置類型</th>
<th>申請日期</th>
<th>狀態</th>
<th></th>
</tr>
</thead>
<tbody>
<tr>
<td>Lam Chun Ho</td>
<td>Laptop</td>
<td>2026-04-27</td>
<td><span class="badge bg-warning">待審批</span></td>
<td>
<button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#approveModal">處理請求</button>
</td>
</tr>
</tbody>
</table>
</div>

<!-- ✅ 主審批 Modal -->
<div class="modal fade" id="approveModal">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">核准借用請求</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<div class="mb-3">
<div class="fw-semibold">申請人</div>
<div class="text-muted">Lam Chun Ho</div>
</div>

<div class="mb-3">
<div class="fw-semibold">裝置類型</div>
<div class="text-muted">Laptop</div>
</div>

<div class="border rounded p-3 bg-light mb-3">
<div class="fw-semibold">已選設備</div>
<div id="selectedDevice" class="text-muted">尚未選擇設備</div>
</div>

<!-- ✅ 修正：先關閉主 modal，再開 picker（避免衝突） -->
<button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#devicePickerModal" data-bs-dismiss="modal">
選擇設備
</button>

<div class="mt-4">
<label class="form-label">管理員備註</label>
<textarea class="form-control" rows="3"></textarea>
</div>

</div>

<div class="modal-footer">
<button class="btn btn-outline-danger" data-bs-toggle="modal" data-bs-target="#rejectModal">拒絕</button>
<button class="btn btn-success">核准</button>
</div>

</div>
</div>
</div>

<!-- ✅ Device Picker -->
<div class="modal fade" id="devicePickerModal">
<div class="modal-dialog modal-xl modal-dialog-scrollable modal-dialog-centered">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">選擇設備</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<div class="row g-2 mb-3">
<div class="col-md-4">
<input class="form-control" placeholder="搜尋設備">
</div>
<div class="col-md-3">
<select class="form-select">
<option>品牌(全部)</option>
<option>HP</option>
<option>Dell</option>
</select>
</div>
</div>

<table class="table table-hover">
<thead>
<tr>
<th>品牌</th>
<th>型號</th>
<th>序列號</th>
<th></th>
</tr>
</thead>
<tbody>
<tr>
<td>HP</td>
<td>EliteBook</td>
<td>SN123</td>
<td>
<button class="btn btn-sm btn-primary" onclick="selectDevice('HP EliteBook SN123')">選擇</button>
</td>
</tr>
<tr>
<td>Dell</td>
<td>XPS</td>
<td>SN456</td>
<td>
<button class="btn btn-sm btn-primary" onclick="selectDevice('Dell XPS SN456')">選擇</button>
</td>
</tr>
</tbody>
</table>

</div>

</div>
</div>
</div>

<!-- ❌ 拒絕 Modal -->
<div class="modal fade" id="rejectModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content border-danger">
<div class="modal-header bg-danger text-white">
<h5 class="modal-title">拒絕借用請求</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<textarea class="form-control" placeholder="原因"></textarea>
</div>
<div class="modal-footer">
<button class="btn btn-danger">確認拒絕</button>
</div>
</div>
</div>
</div>

<!-- ✅ 修正：補回 JS script（之前壞的原因） -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function selectDevice(device){
  document.getElementById('selectedDevice').innerText = device;

  // 關閉 picker
  const picker = bootstrap.Modal.getInstance(document.getElementById('devicePickerModal'));
  picker.hide();

  // 再打開主 modal
  const mainModal = new bootstrap.Modal(document.getElementById('approveModal'));
  mainModal.show();
}
</script>

</body>
</html>
