<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>裝置管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav id="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark"></nav>
<script src="js/layout.js"></script>

<div class="container mt-4">
  <h4 class="mb-3">裝置管理</h4>

  <table class="table table-bordered table-hover bg-white align-middle">
    <thead class="table-light">
      <tr>
        <th>裝置類型</th>
        <th>裝置名稱</th>
        <th>目前狀態</th>
        <th style="width:220px;">動作</th>
      </tr>
    </thead>
    <tbody>

      <tr>
        <td>Laptop</td>
        <td>IT-LAP-001</td>
        <td><span class="badge bg-success">可借用</span></td>
        <td>
          <button class="btn btn-sm btn-outline-primary"
                  data-bs-toggle="modal" data-bs-target="#editDeviceModal">
            更改資料
          </button>
          <button class="btn btn-sm btn-outline-danger"
                  data-bs-toggle="modal" data-bs-target="#removeDeviceModal">
            移除裝置
          </button>
        </td>
      </tr>

      <tr>
        <td>Laptop</td>
        <td>IT-LAP-002</td>
        <td><span class="badge bg-secondary">已借出</span></td>
        <td>
          <button class="btn btn-sm btn-outline-primary"
                  data-bs-toggle="modal" data-bs-target="#editDeviceModal">
            更改資料
          </button>
        </td>
      </tr>

      <tr>
        <td>Tablet</td>
        <td>IT-TAB-003</td>
        <td><span class="badge bg-success">可借用</span></td>
        <td>
          <button class="btn btn-sm btn-outline-primary"
                  data-bs-toggle="modal" data-bs-target="#editDeviceModal">
            更改資料
          </button>
          <button class="btn btn-sm btn-outline-danger"
                  data-bs-toggle="modal" data-bs-target="#removeDeviceModal">
            移除裝置
          </button>
        </td>
      </tr>

      <tr>
        <td>Mobile</td>
        <td>IT-MOB-004</td>
        <td><span class="badge bg-success">可借用</span></td>
        <td>
          <button class="btn btn-sm btn-outline-primary"
                  data-bs-toggle="modal" data-bs-target="#editDeviceModal">
            更改資料
          </button>
          <button class="btn btn-sm btn-outline-danger"
                  data-bs-toggle="modal" data-bs-target="#removeDeviceModal">
            移除裝置
          </button>
        </td>
      </tr>

      <tr>
        <td>Mobile</td>
        <td>IT-MOB-005</td>
        <td><span class="badge bg-secondary">已借出</span></td>
        <td>
          <button class="btn btn-sm btn-outline-primary"
                  data-bs-toggle="modal" data-bs-target="#editDeviceModal">
            更改資料
          </button>
        </td>
      </tr>

    </tbody>
  </table>
</div>

<!-- 更改裝置資料 Modal（不允許改狀態） -->
<div class="modal fade" id="editDeviceModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">更改裝置資料</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label">裝置類型</label>
              <select class="form-select">
                <option>Laptop</option>
                <option>Tablet</option>
                <option>Mobile</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">裝置品牌</label>
              <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">裝置型號</label>
              <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">產品序列號</label>
              <input type="text" class="form-control">
            </div>

            <div class="col-12">
              <label class="form-label">目前狀態</label><br>
              <span class="badge bg-secondary">已借出</span>
              <small class="text-muted ms-2">（由系統自動設定）</small>
            </div>

          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary">儲存變更</button>
      </div>
    </div>
  </div>
</div>

<!-- 移除裝置確認 Modal -->
<div class="modal fade" id="removeDeviceModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-danger">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">移除裝置</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>你即將移除此裝置。</p>
        <div class="alert alert-warning mb-0">
          ⚠️ 此動作不可復原。
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-danger">確認移除</button>
      </div>
    </div>
  </div>
</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
