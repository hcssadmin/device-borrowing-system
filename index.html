<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <title>Device Borrowing Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">裝置借用系統</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link" href="index.html">狀態主頁</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="device-management.html">裝置管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="incompleted-request-admin.html">待處理請求</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="borrowed-device-admin.html">已借出裝置</a>
        </li>

      </ul>

      <span class="navbar-text text-white">
        登入使用者：Admin
      </span>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h4 class="mb-4">整體狀態總覽</h4>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card text-bg-warning">
        <div class="card-body">
          <h5 class="card-title">待處理請求</h5>
          <p class="card-text fs-3">3</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-success">
        <div class="card-body">
          <h5 class="card-title">借出中裝置</h5>
          <p class="card-text fs-3">7</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-secondary">
        <div class="card-body">
          <h5 class="card-title">本月完成交接</h5>
          <p class="card-text fs-3">12</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://ejinjfirecaduuclyjaf.supabase.co',
    '你的 anon key（保留原本那串）'
  )

  console.log("connected ✅")

  const userText = document.querySelector('.navbar-text')

  // ✅ 建立按鈕（先建立，不馬上加進去）
  const loginBtn = document.createElement("button")
  loginBtn.innerText = "Login"
  loginBtn.className = "btn btn-primary ms-2"

  const logoutBtn = document.createElement("button")
  logoutBtn.innerText = "Logout"
  logoutBtn.className = "btn btn-danger ms-2"

  // ✅ Login
  loginBtn.addEventListener("click", async () => {
    await supabase.auth.signInWithOAuth({
      provider: 'google'
    })
  })

  // ✅ Logout
  logoutBtn.addEventListener("click", async () => {
    await supabase.auth.signOut()
    location.reload()
  })

  // ✅ 更新 UI（統一處理）
  function updateUI(session) {
    userText.innerHTML = ""  // 清空

    if (session) {
      const text = document.createTextNode(`登入使用者：${session.user.email} `)
      userText.appendChild(text)
      userText.appendChild(logoutBtn)
    } else {
      const text = document.createTextNode("未登入 ")
      userText.appendChild(text)
      userText.appendChild(loginBtn)
    }
  }

  // ✅ 核心：監聽登入狀態（這是關鍵！！！）
  supabase.auth.onAuthStateChange((event, session) => {
    console.log("Auth event:", event)
    updateUI(session)
  })

  // ✅ 初始載入（防止一開始顯示錯誤）
  async function init() {
    const { data: { session } } = await supabase.auth.getSession()
    updateUI(session)
  }

  init()
</script>
</body>
</html>
