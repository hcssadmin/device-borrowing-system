<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <title>Device Borrowing Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">裝置借用系統</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link" href="index.html">狀態主頁</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="device-management.html">裝置管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="incompleted-request-admin.html">待處理請求</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="borrowed-device-admin.html">已借出裝置</a>
        </li>

      </ul>

      <span class="navbar-text text-white">
        登入使用者：Admin
      </span>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h4 class="mb-4">整體狀態總覽</h4>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card text-bg-warning">
        <div class="card-body">
          <h5 class="card-title">待處理請求</h5>
          <p class="card-text fs-3">3</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-success">
        <div class="card-body">
          <h5 class="card-title">借出中裝置</h5>
          <p class="card-text fs-3">7</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-secondary">
        <div class="card-body">
          <h5 class="card-title">本月完成交接</h5>
          <p class="card-text fs-3">12</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://ejinjfirecaduuclyjaf.supabase.co',
    '你的 anon key（你現在那串）'
  )

  console.log("connected ✅")

  // ✅ 建立 Login 按鈕（動態加，避免改很多 HTML）
  const loginBtn = document.createElement("button")
  loginBtn.innerText = "Login with Google"
  loginBtn.className = "btn btn-primary ms-3"
  document.querySelector('.navbar-text').appendChild(loginBtn)

  // ✅ Login
  loginBtn.addEventListener("click", async () => {
    await supabase.auth.signInWithOAuth({
      provider: 'google'
    })
  })

  // ✅ Logout 按鈕
  const logoutBtn = document.createElement("button")
  logoutBtn.innerText = "Logout"
  logoutBtn.className = "btn btn-danger ms-2"
  document.querySelector('.navbar-text').appendChild(logoutBtn)

  logoutBtn.addEventListener("click", async () => {
    await supabase.auth.signOut()
    location.reload()
  })

  // ✅ 檢查登入狀態
  async function checkUser() {
    const {
      data: { session }
    } = await supabase.auth.getSession()

    const userText = document.querySelector('.navbar-text')

    if (session) {
      userText.innerHTML = `
        登入使用者：${session.user.email}
      `
    } else {
      userText.innerHTML = `
        未登入
      `
    }
  }

  checkUser()
</script>
</body>
</html>
