<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>登入 - 裝置借用系統</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height:100vh;">

  <div class="card p-5 shadow text-center" style="width:460px; border-radius:12px;">

    <!-- ✅ 校徽 + 學校名稱 -->
    <div class="d-flex align-items-center justify-content-center mb-4">
      
      <img src="hcs_logo.png" alt="校徽" style="width:50px; height:50px; margin-right:12px;">

      <div style="font-size:22px; font-weight:600;">
        聖公會聖匠中學
      </div>

    </div>

    <!-- ✅ 系統名稱 -->
    <div style="font-size:22px; font-weight:600;" class="mb-2">
      裝置借用系統
    </div>

    <!-- ✅ 登錄界面 -->
    <div style="font-size:22px; font-weight:600;" class="mb-4">
      登錄界面
    </div>

    <!-- ✅ Google Login -->
    <button id="loginBtn"
      class="btn btn-primary w-100 d-flex align-items-center justify-content-center"
      style="height:50px; font-size:18px; border-radius:8px;">

      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
           style="width:20px; margin-right:10px;">

      Login with Google
    </button>

    <!-- ✅ 提示 -->
    <p id="status" class="mt-4" style="font-size:16px;">
      請使用 Google 登入
    </p>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      'https://ejinjfirecaduuclyjaf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqaW5qZmlyZWNhZHV1Y2x5amFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzkwMzMsImV4cCI6MjA5MzAxNTAzM30.gaFJqUBPGihbYaHgxaAyVRwnmazVWeSssnjTzUslXlw'
    )

    // ✅ 已登入 → 跳 dashboard
    const { data: { session } } = await supabase.auth.getSession()

    if (session) {
      window.location.href = "/dashboard.html"
    }

    // ✅ Google login
    document.getElementById("loginBtn").addEventListener("click", async () => {
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + "/dashboard.html"
        }
      })
    })
  </script>

</body>
</html>
