<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>Login - Device System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height:100vh;">

  <div class="card p-4 shadow" style="width:350px;">
    <h3 class="text-center mb-3">登入系統</h3>

    <button id="loginBtn" class="btn btn-primary w-100">
      Login with Google
    </button>

    <p id="status" class="text-center mt-3 text-muted"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      'https://ejinjfirecaduuclyjaf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqaW5qZmlyZWNhZHV1Y2x5amFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzkwMzMsImV4cCI6MjA5MzAxNTAzM30.gaFJqUBPGihbYaHgxaAyVRwnmazVWeSssnjTzUslXlw'
    )

    const status = document.getElementById('status')

    // ✅ 如果已登入 → 直接跳 dashboard
    const { data: { session } } = await supabase.auth.getSession()

    if (session) {
      window.location.href = "/dashboard.html"
    }

    // ✅ Login
    document.getElementById("loginBtn").addEventListener("click", async () => {
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + "/dashboard.html"
        }
      })
    })

    status.innerText = "請使用 Google 登入"

  </script>

</body>
</html>
