<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light" style="display:none;">

<!-- ✅ Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand">裝置借用系統</a>

    <span class="text-white ms-auto" id="userText"></span>
  </div>
</nav>

<div class="container mt-4">
  <h4 class="mb-4">整體狀態總覽</h4>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card text-bg-warning">
        <div class="card-body">
          <h5 class="card-title">待處理請求</h5>
          <p class="card-text fs-3">3</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-success">
        <div class="card-body">
          <h5 class="card-title">借出中裝置</h5>
          <p class="card-text fs-3">7</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-secondary">
        <div class="card-body">
          <h5 class="card-title">本月完成交接</h5>
          <p class="card-text fs-3">12</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      'https://ejinjfirecaduuclyjaf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqaW5qZmlyZWNhZHV1Y2x5amFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzkwMzMsImV4cCI6MjA5MzAxNTAzM30.gaFJqUBPGihbYaHgxaAyVRwnmazVWeSssnjTzUslXlw'
    )

  const userText = document.getElementById('userText')

  // ✅ require login
  const { data: { session } } = await supabase.auth.getSession()

  if (!session) {
    window.location.href = "/index.html"
  }

  // ✅ 顯示頁面（避免閃）
  document.body.style.display = "block"

  // ✅ 顯示 user + logout
  function renderUI(session) {
    userText.innerHTML = ""

    const email = document.createTextNode(session.user.email + " ")
    userText.appendChild(email)

    const logoutBtn = document.createElement("button")
    logoutBtn.innerText = "Logout"
    logoutBtn.className = "btn btn-sm btn-danger"

    logoutBtn.onclick = async () => {
      await supabase.auth.signOut()
      window.location.href = "/index.html"
    }

    userText.appendChild(logoutBtn)
  }

  renderUI(session)

  // ✅ 防止 session 變動不同步
  supabase.auth.onAuthStateChange((event, session) => {
    if (!session) {
      window.location.href = "/index.html"
    }
  })

</script>

</body>
</html>
