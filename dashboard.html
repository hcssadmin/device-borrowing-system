<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light" style="display:none;">

<!-- ✅ Navbar 容器（動態載入） -->
<div id="navbar"></div>

<div class="container mt-4">
  <h4 class="mb-4">整體狀態總覽</h4>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card text-bg-warning">
        <div class="card-body">
          <h5 class="card-title">待處理請求</h5>
          <p class="card-text fs-3">3</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-success">
        <div class="card-body">
          <h5 class="card-title">借出中裝置</h5>
          <p class="card-text fs-3">7</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-secondary">
        <div class="card-body">
          <h5 class="card-title">本月完成交接</h5>
          <p class="card-text fs-3">12</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  import { loadNavbar, renderMenu } from './js/layout.js'

  const supabase = createClient(
     'https://ejinjfirecaduuclyjaf.supabase.co',
     'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqaW5qZmlyZWNhZHV1Y2x5amFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzkwMzMsImV4cCI6MjA5MzAxNTAzM30.gaFJqUBPGihbYaHgxaAyVRwnmazVWeSssnjTzUslXlw'
  )

  // ✅ Step 1：檢查登入
  const { data: { session } } = await supabase.auth.getSession()

  if (!session) {
    window.location.replace("/index.html")
  }

  // ✅ Step 2：載入 navbar（⚠️ 必須先做）
  await loadNavbar()

  // ✅ Step 3：查 role
  const { data } = await supabase
    .from('tbl_staff')
    .select('role')
    .eq('staff_id', session.user.id)
    .single()
  

  //console.log("data:", data)
  //console.log("error:", error)

  
  const role = data?.role || 'user'

  // ✅ Step 4：render menu（角色導航）
  renderMenu(role)

  // ✅ Step 5：顯示 user + logout
  const userText = document.getElementById('userText')

  function renderUser() {
    userText.innerHTML = ""

    const email = document.createTextNode(
      session.user.email + " (" + role + ") "
    )

    userText.appendChild(email)

    const logoutBtn = document.createElement("button")
    logoutBtn.innerText = "Logout"
    logoutBtn.className = "btn btn-danger btn-sm"

    logoutBtn.onclick = async () => {
      await supabase.auth.signOut()
      window.location.replace("/index.html")
    }

    userText.appendChild(logoutBtn)
  }

  renderUser()

  // ✅ Step 6：顯示頁面（避免閃）
  document.body.style.display = "block"

  // ✅ Step 7：監聽 session（保險）
  supabase.auth.onAuthStateChange((event, session) => {
    if (!session) {
      window.location.replace("/index.html")
    }
  })
</script>

</body>
</html>
